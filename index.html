<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <div class="profile-img-container">
    <img src="1780583480813.png" alt="ภูตะวัน จันทร์ศรีทอง">
    <title>โปรไฟล์นักศึกษา - ภูตะวัน จันทร์ศรีทอง</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .profile-card {
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 350px;
            max-width: 90%;
        }
        .profile-header {
            background-color: #1a5b82; /* โทนสีน้ำเงินกรมท่า ดูเป็นทางการ */
            color: white;
            text-align: center;
            padding: 30px 20px 60px;
        }
        .profile-header h2 {
            margin-bottom: 5px;
            font-size: 1.3rem;
        }
        .profile-header p {
            font-size: 0.95rem;
            color: #d1e8ff;
        }
        .profile-body {
            padding: 20px 30px 30px;
            position: relative;
            padding-top: 70px;
        }
        .profile-img-container {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid #fff;
            overflow: hidden;
            background-color: #f0f0f0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .profile-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }
        .info-group {
            margin-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 10px;
        }
        .info-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .info-label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 1.05rem;
            font-weight: 500;
            color: #222;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="profile-header">
            <h2>มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง</h2>
            <p>คณะวิทยาศาสตร์และเทคโนโลยี</p>
        </div>
        
        <div class="profile-body">
            <div class="profile-img-container">
                <img src="1780583480813.png" alt="ภูตะวัน จันทร์ศรีทอง">
            </div>
            
            <div class="info-group">
                <div class="info-label">ชื่อ-นามสกุล</div>
                <div class="info-value">ภูตะวัน จันทร์ศรีทอง</div>
            </div>
            
            <div class="info-group">
                <div class="info-label">รหัสนักศึกษา</div>
                <div class="info-value">694245008</div>
            </div>
            
            <div class="info-group">
                <div class="info-label">สาขาวิชา</div>
                <div class="info-value">วิทยาการคอมพิวเตอร์</div>
            </div>

            <div class="info-group">
                <div class="info-label">เบอร์โทรศัพท์</div>
                <div class="info-value">0947304607</div>
            </div>

            <div class="info-group">
                <div class="info-label">อีเมล</div>
                <div class="info-value">rougo2226@gmail.com</div>
            </div>
        </div>
    </div>

</body>
</html>
